[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "singularity-operator"
version = "0.2.0"
description = "The ultimate comprehensive self-improving AI system (Singularity Operator) with universal EverythingDB, SelfImprover, and full Orchestrator. Groq-powered, autonomous, transistor-model caching. All steps to next setpoint: swarm, userscript gen, browser hooks, GitHub seamless."
authors = [{name = "Eric (Mufnluvn)"}]
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["requests"]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.packages.find]
where = ["."]